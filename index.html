  <header class="site-header">
    <span class="header-label"></span>
    <span class="header-divider">✦</span>
    <h1 class="header-title">CAESAR CIPHER</h1>
    <span class="header-divider">✦</span>
    <span class="header-label"></span>
  </header>

  <main class="layout">

    <!-- LEFT COLUMN: input -->
    <section class="panel panel-left float-anim" id="panel-left">
      <div class="panel-header">
        <span class="panel-icon">◈</span>
        <h2 class="panel-title">PLAINTEXT</h2>
        <span class="panel-icon">◈</span>
      </div>
      <div class="panel-body">
        <textarea
          id="plaintext"
          class="text-area"
          placeholder="Write your message here…"
          spellcheck="false"
          autocomplete="off"
        ></textarea>
      </div>
      <div class="panel-footer">
        <span class="char-count" id="plain-count">0 characters</span>
        <span class="mode-badge" id="mode-badge">ENCRYPTION</span>
      </div>
    </section>

    <!-- CENTER COLUMN: wheel -->
    <section class="wheel-column">

      <div class="wheel-wrapper float-anim-slow">

        <div class="wheel-container" id="wheel-container">

          <!-- FIXED OUTER RING -->
          <div class="wheel-ring wheel-outer" id="wheel-outer">
            <div class="ring-texture"></div>
            <div class="ring-border-outer"></div>
            <canvas id="canvas-outer" class="ring-canvas"></canvas>
            <div class="ring-decorative-outer"></div>
          </div>

          <!-- ROTATING INNER WHEEL -->
          <div class="wheel-ring wheel-inner" id="wheel-inner">
            <div class="ring-texture ring-texture-inner"></div>
            <canvas id="canvas-inner" class="ring-canvas"></canvas>
            <div class="wheel-center-decoration">
              <div class="center-text-block">
                <span class="center-initials">CAESAR</span>
                <span class="center-subtitle">CIPHER</span>
              </div>
            </div>
          </div>

          <!-- CENTER PIN -->
          <div class="wheel-pin">
            <div class="pin-inner"></div>
            <div class="pin-shine"></div>
          </div>

          <!-- ALIGNMENT INDICATOR -->
          <div class="alignment-marker"></div>

        </div><!-- /wheel-container -->

      </div><!-- /wheel-wrapper -->

      <!-- CONTROLS BELOW THE WHEEL -->
      <div class="controls-block float-anim">

        <div class="mode-toggle">
          <button class="toggle-btn active" id="btn-encrypt" data-mode="encrypt">ENCRYPT</button>
          <button class="toggle-btn" id="btn-decrypt" data-mode="decrypt">DECRYPT</button>
        </div>

        <div class="slider-block">
          <div class="slider-labels">
            <span>I</span>
            <span>ROTATION KEY</span>
            <span>XX</span>
          </div>
          <div class="slider-track-wrap">
            <input
              type="range"
              id="key-slider"
              class="key-slider"
              min="1"
              max="25"
              value="3"
            />
            <div class="slider-fill" id="slider-fill"></div>
          </div>
          <div class="key-display">
            <span class="key-value-label">SHIFT</span>
            <span class="key-value" id="key-value">+3</span>
          </div>
        </div>

        <div class="brute-btn-wrap">
          <button class="brute-btn" id="brute-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            BRUTE FORCE
          </button>
        </div>

      </div><!-- /controls-block -->

    </section><!-- /wheel-column -->

    <!-- RIGHT COLUMN: output -->
    <section class="panel panel-right float-anim" id="panel-right">
      <div class="panel-header">
        <span class="panel-icon">◈</span>
        <h2 class="panel-title">CIPHERTEXT</h2>
        <span class="panel-icon">◈</span>
      </div>
      <div class="panel-body">
        <textarea
          id="ciphertext"
          class="text-area text-area-output"
          placeholder="Ciphertext will appear here…"
          readonly
          spellcheck="false"
        ></textarea>
      </div>
      <div class="panel-footer">
        <span class="char-count" id="cipher-count">0 characters</span>
        <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          COPY
        </button>
      </div>
    </section>

  </main>

  <!-- BRUTE FORCE RESULTS SECTION -->
  <section class="brute-section" id="brute-section" hidden>
    <div class="brute-panel">

      <div class="brute-header">
        <div class="brute-header-left">
          <span class="panel-icon">◈</span>
          <h2 class="brute-title">BRUTE FORCE ANALYSIS</h2>
          <span class="brute-hint">— click a row to apply the key</span>
        </div>
        <div class="brute-header-right">
          <span class="brute-count" id="brute-count">25 KEYS</span>
          <button class="brute-close" id="brute-close" title="Close">✕</button>
        </div>
      </div>

      <div class="brute-col-labels">
        <span>SHIFT</span>
        <span>DECRYPTED TEXT</span>
      </div>

      <div class="brute-results" id="brute-results"></div>

    </div>
  </section>
